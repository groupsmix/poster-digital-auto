name: Deploy Backend to Hetzner

on:
  # Auto-deploy when pushing to main
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'deploy/**'
      - '.github/workflows/deploy-backend.yml'

  # Manual one-click deploy from GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TUMBLR_API_KEY: ${{ secrets.TUMBLR_API_KEY }}
          TUMBLR_ACCESS_TOKEN: ${{ secrets.TUMBLR_ACCESS_TOKEN }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          port: ${{ secrets.HETZNER_SSH_PORT != '' && secrets.HETZNER_SSH_PORT || '22' }}
          envs: GEMINI_API_KEY,GROQ_API_KEY,CLOUDFLARE_ACCOUNT_ID,CLOUDFLARE_API_TOKEN,CEREBRAS_API_KEY,MISTRAL_API_KEY,HUGGINGFACE_API_TOKEN,TELEGRAM_BOT_TOKEN,TELEGRAM_CHANNEL_ID,TUMBLR_API_KEY,TUMBLR_ACCESS_TOKEN,TUMBLR_BLOG_NAME,PINTEREST_ACCESS_TOKEN,PINTEREST_BOARD_ID
          script: |
            set -e

            APP_DIR="/opt/ai-product-factory"

            echo "=== Deploying Backend ==="

            # Pull latest code
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies
            source .venv/bin/activate
            pip install --upgrade pip --quiet
            poetry install --no-interaction --quiet

            # ── Write .env file from GitHub Secrets ──
            echo "Writing .env file..."
            cat > "$APP_DIR/.env" << 'ENVEOF'
            # AI Product Factory - Production Environment Variables
            # Managed via GitHub Secrets — change at:
            # https://github.com/groupsmix/poster-digital-auto/settings/secrets/actions

            DATABASE_PATH=/data/app.db
            ENVEOF

            # Remove leading whitespace from heredoc
            sed -i 's/^            //' "$APP_DIR/.env"

            # Add each API key (only if the secret is set)
            [ -n "$GEMINI_API_KEY" ] && echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> "$APP_DIR/.env"
            [ -n "$GROQ_API_KEY" ] && echo "GROQ_API_KEY=$GROQ_API_KEY" >> "$APP_DIR/.env"
            [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID" >> "$APP_DIR/.env"
            [ -n "$CLOUDFLARE_API_TOKEN" ] && echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> "$APP_DIR/.env"
            [ -n "$CEREBRAS_API_KEY" ] && echo "CEREBRAS_API_KEY=$CEREBRAS_API_KEY" >> "$APP_DIR/.env"
            [ -n "$MISTRAL_API_KEY" ] && echo "MISTRAL_API_KEY=$MISTRAL_API_KEY" >> "$APP_DIR/.env"
            [ -n "$HUGGINGFACE_API_TOKEN" ] && echo "HUGGINGFACE_API_TOKEN=$HUGGINGFACE_API_TOKEN" >> "$APP_DIR/.env"
            [ -n "$TELEGRAM_BOT_TOKEN" ] && echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> "$APP_DIR/.env"
            [ -n "$TELEGRAM_CHANNEL_ID" ] && echo "TELEGRAM_CHANNEL_ID=$TELEGRAM_CHANNEL_ID" >> "$APP_DIR/.env"
            [ -n "$TUMBLR_API_KEY" ] && echo "TUMBLR_API_KEY=$TUMBLR_API_KEY" >> "$APP_DIR/.env"
            [ -n "$TUMBLR_ACCESS_TOKEN" ] && echo "TUMBLR_ACCESS_TOKEN=$TUMBLR_ACCESS_TOKEN" >> "$APP_DIR/.env"
            [ -n "$TUMBLR_BLOG_NAME" ] && echo "TUMBLR_BLOG_NAME=$TUMBLR_BLOG_NAME" >> "$APP_DIR/.env"
            [ -n "$PINTEREST_ACCESS_TOKEN" ] && echo "PINTEREST_ACCESS_TOKEN=$PINTEREST_ACCESS_TOKEN" >> "$APP_DIR/.env"
            [ -n "$PINTEREST_BOARD_ID" ] && echo "PINTEREST_BOARD_ID=$PINTEREST_BOARD_ID" >> "$APP_DIR/.env"

            echo ".env file updated with $(grep -c '=' "$APP_DIR/.env") variables"

            # Copy updated systemd/nginx configs if changed
            cp deploy/systemd/ai-product-factory.service /etc/systemd/system/
            systemctl daemon-reload

            # Restart the backend service
            systemctl restart ai-product-factory

            # Wait a moment and verify it's running
            sleep 3
            if systemctl is-active --quiet ai-product-factory; then
              echo "Backend deployed and running successfully!"
            else
              echo "ERROR: Backend failed to start!"
              journalctl -u ai-product-factory --no-pager -n 20
              exit 1
            fi

            echo "=== Deployment Complete ==="
